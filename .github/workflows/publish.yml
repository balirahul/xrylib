# Publishes xrylib to PyPI when a GitHub Release is created.
# Uses PyPA Trusted Publishing (OIDC) — no API token needed.
# Setup: https://docs.pypi.org/trusted-publishers/
#
# SETUP_REQUIRED:
#   1. On PyPI:     Add a Trusted Publisher for this repo + environment "pypi"
#   2. On TestPyPI: Add a Trusted Publisher for this repo + environment "testpypi"
#   3. In GitHub:   Create "pypi" and "testpypi" environments under Settings > Environments

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ── Step 1: Build and verify the distribution ─────────────────────────────
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build release distributions
        run: |
          python -m build

      - name: Verify distributions with twine
        run: |
          twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # ── Step 2: Publish to TestPyPI first (smoke-test the release) ────────────
  testpypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write

    environment:
      name: testpypi
      # Strip leading "v" from tag so URL matches PyPI version format (e.g. "2.0.0")
      url: https://test.pypi.org/project/xrylib/${{ github.event.release.tag_name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  # ── Step 3: Publish to PyPI only after TestPyPI succeeds ─────────────────
  pypi-publish:
    runs-on: ubuntu-latest
    needs: testpypi-publish
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/xrylib/${{ github.event.release.tag_name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
